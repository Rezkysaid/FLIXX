    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

firebase.initializeApp({

const LANG = {

  zh:{appSub:"视频灵感库",save:"+ 保存",all:"全部",latest:"最新",topRated:"最高评分",search:"搜索...",vaultEmpty:"库是空的",vaultDesc:"保存来自TikTok、Instagram和Facebook的热门视频，作为团队创作灵感",saveFirst:"+ 保存第一个视频",connecting:"连接中...",saveVideo:"保存视频",saveSubtitle:"添加到 TrendVault",urlLabel:"视频链接",titleLabel:"标题",savedByLabel:"保存者",notesLabel:"备注",catLabel:"类别",ratingLabel:"评分",simpan:"保存 →",saving:"保存中...",urlPh:"https://tiktok.com/@...",titlePh:"这个视频有什么亮点？",savedByPh:"你的名字",notesPh:"关于这个视频的备注...",comment:"写评论...",builtBy:"由...构建",updated:"已更新 ✓",removed:"已删除",saved:"已保存! 🔥",statuses:["已保存","进行中","已使用"],cats:["钩子","转场","产品演示","故事叙述","热门音乐","行动号召","其他"]},
};
const LANG_LABELS = {ms:"BM",en:"EN",zh:"中文"};

// ── PLATFORM CONFIG ──
const P = {
  TikTok:{accent:"#FE2C55",glow:"rgba(254,44,85,0.25)",grad:"linear-gradient(135deg,#FE2C55,#FF7043)"},
  Instagram:{accent:"#C13584",glow:"rgba(193,53,132,0.25)",grad:"linear-gradient(135deg,#833AB4,#C13584,#E1306C)"},
  Facebook:{accent:"#1877F2",glow:"rgba(24,119,242,0.25)",grad:"linear-gradient(135deg,#1565C0,#1877F2)"},
};
const STATUSES_EN = ["Saved","In Progress","Used"];
const CATEGORIES = ["Hook","Transition","Product Demo","Storytelling","Trending Audio","CTA","Lain-lain"];
const STATUS_CFG = {
  "Saved":{color:"#8B6347",dot:"#A0714F",bg:"rgba(44,26,14,0.07)"},
  "In Progress":{color:"#B8760A",dot:"#D4920E",bg:"rgba(212,146,14,0.12)"},
  "Used":{color:"#2E7D4F",dot:"#3DAF6A",bg:"rgba(61,175,106,0.12)"},
};

// ── COMPONENTS ──
function Stars({val,onChange}) {
  const [h,setH]=useState(0);
  return (
    <div style={{display:"flex",gap:2}}>
      {[1,2,3,4,5].map(s=>(
        <span key={s}
          onMouseEnter={()=>onChange&&setH(s)}
          onMouseLeave={()=>onChange&&setH(0)}
          onClick={()=>onChange&&onChange(s)}
          style={{fontSize:15,cursor:onChange?"pointer":"default",
            color:s<=(h||val)?"#C47B2B":"rgba(44,26,14,0.2)",
            display:"inline-block",transition:"all 0.1s",
            transform:s<=(h||val)?"scale(1.2)":"scale(1)"}}>★</span>
      ))}
    </div>
  );
}

function PTag({platform}) {
  const p=P[platform]||P.TikTok;
  return (
    <span style={{background:`${p.accent}22`,border:`1px solid ${p.accent}55`,
      borderRadius:6,padding:"3px 8px",fontSize:9,fontWeight:800,letterSpacing:1.2,
      color:p.accent,display:"inline-flex",alignItems:"center",gap:4}}>
      {platform?.toUpperCase()}
    </span>
  );
}

function STag({status,onClick}) {
  const s=STATUS_CFG[status]||STATUS_CFG.Saved;
  return (
    <span onClick={onClick} style={{background:s.bg,border:`1px solid ${s.dot}44`,
      borderRadius:6,padding:"3px 9px",fontSize:10,fontWeight:700,color:s.color,
      display:"inline-flex",alignItems:"center",gap:5,
      cursor:onClick?"pointer":"default",userSelect:"none",transition:"opacity 0.15s"}}>
      <span style={{width:5,height:5,borderRadius:"50%",background:s.dot,flexShrink:0,
        animation:status==="In Progress"?"blink 1.3s infinite":"none"}}/>
      {status}
    </span>
  );
}

// ── NAME GATE ──
function NameGate({onEnter}) {
  const [name,setName]=useState("");
  const submit=()=>{ if(!name.trim()) return; localStorage.setItem("tv_username",name.trim()); onEnter(name.trim()); };
  return (
    <div style={{position:"fixed",inset:0,zIndex:500,background:"#F5EFE6",
      display:"flex",alignItems:"center",justifyContent:"center",padding:32}}>
      <div style={{position:"absolute",inset:0,overflow:"hidden",pointerEvents:"none"}}>
        <div style={{position:"absolute",width:500,height:500,top:"-10%",left:"50%",transform:"translateX(-50%)",
          borderRadius:"50%",background:"radial-gradient(circle,rgba(139,69,19,0.08) 0%,transparent 70%)",filter:"blur(80px)"}}/>
      </div>
      <div style={{width:"100%",maxWidth:360,position:"relative",zIndex:1,textAlign:"center"}}>
        {/* Wordmark only — no icon */}
        <div style={{marginBottom:40}}>
          <div style={{fontSize:42,fontWeight:900,letterSpacing:-2,color:"#2C1A0E",lineHeight:1,marginBottom:6}}>TrendVault</div>
          <div style={{fontSize:9,letterSpacing:4,color:"#B8916F",fontWeight:700}}>ALI × TMOMO BUDDY</div>
        </div>
        {/* Form */}
        <div style={{background:"rgba(237,224,208,0.7)",border:"1px solid rgba(44,26,14,0.08)",
          borderRadius:24,padding:"32px 28px",boxShadow:"0 4px 40px rgba(44,26,14,0.08)"}}>
          <div style={{fontSize:20,fontWeight:900,color:"#2C1A0E",marginBottom:8,letterSpacing:-0.5}}>Who are you?</div>
          <div style={{fontSize:13,color:"#A0714F",marginBottom:24,lineHeight:1.6}}>
            Enter your name so your team knows who saved each video.
          </div>
          <input value={name} onChange={e=>setName(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&submit()}
            placeholder="Your name..." autoFocus
            style={{width:"100%",background:"rgba(255,255,255,0.6)",
              border:"1.5px solid rgba(44,26,14,0.1)",borderRadius:14,
              padding:"14px 18px",color:"#2C1A0E",fontSize:15,outline:"none",
              marginBottom:16,textAlign:"center",fontWeight:600,
              boxShadow:"0 2px 8px rgba(44,26,14,0.06)"}}
            onFocus={e=>e.target.style.border="1.5px solid rgba(44,26,14,0.35)"}
            onBlur={e=>e.target.style.border="1.5px solid rgba(44,26,14,0.1)"}/>
          <button onClick={submit} disabled={!name.trim()} style={{
            width:"100%",
            background:name.trim()?"linear-gradient(135deg,#2C1A0E,#5C3317)":"rgba(44,26,14,0.07)",
            border:"none",borderRadius:14,padding:"14px",
            color:name.trim()?"#F5EFE6":"#B8916F",fontSize:14,fontWeight:800,
            cursor:name.trim()?"pointer":"not-allowed",
            boxShadow:name.trim()?"0 6px 20px rgba(44,26,14,0.25)":"none",
            transition:"all 0.2s",letterSpacing:0.2}}>
            Enter →
          </button>
        </div>
        <div style={{marginTop:20,fontSize:11,color:"#C4A882"}}>Your name is only visible to your team</div>
      </div>
    </div>
  );
}

// ── NOTIF BANNER ──
function NotifBanner({notif,onClose}) {
  useEffect(()=>{ const t=setTimeout(onClose,4000); return ()=>clearTimeout(t); },[]);
  if(!notif) return null;
  return (
    <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",
      zIndex:400,maxWidth:310,width:"calc(100% - 32px)",
      background:"rgba(237,224,208,0.97)",border:"1px solid rgba(44,26,14,0.12)",
      borderRadius:16,padding:"12px 14px",
      boxShadow:"0 8px 32px rgba(44,26,14,0.2)",
      animation:"pop 0.3s ease",display:"flex",alignItems:"center",gap:0}}>
      <div style={{width:36,height:36,borderRadius:10,flexShrink:0,
        background:"linear-gradient(135deg,#2C1A0E,#4A2C1A)",
        display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>☕</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:12,fontWeight:700,color:"#2C1A0E",marginBottom:1}}>{notif.savedBy} baru simpan video</div>
        <div style={{fontSize:11,color:"#A0714F",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{notif.title}</div>
      </div>
      <button onClick={onClose} style={{background:"none",border:"none",color:"#A0714F",cursor:"pointer",fontSize:14,padding:0}}>✕</button>
    </div>
  );
}

// ── VIDEO PLAYER ──
function VideoPlayer({v,onClose}) {
  const p=P[v.platform]||P.TikTok;
  const getEmbed=()=>{
    const url=v.url||"";
    if(url.includes("tiktok.com")){
      const match=url.match(/video\/([0-9]+)/)||url.match(/\/([0-9]{15,})/);
      if(match) return <iframe src={`https://www.tiktok.com/embed/v2/${match[1]}`} style={{width:"100%",height:"100%",border:"none"}} allowFullScreen allow="autoplay"/>;
    }
    if(url.includes("instagram.com")){
      const match=url.match(/\/reel\/([A-Za-z0-9_-]+)/)||url.match(/\/p\/([A-Za-z0-9_-]+)/);
      if(match) return <iframe src={`https://www.instagram.com/p/${match[1]}/embed`} style={{width:"100%",height:"100%",border:"none"}} allowFullScreen/>;
    }
    if(url.includes("facebook.com")||url.includes("fb.watch"))
      return <iframe src={`https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=false&autoplay=true`} style={{width:"100%",height:"100%",border:"none"}} allowFullScreen allow="autoplay"/>;
    if(url.includes("youtube.com")||url.includes("youtu.be")){
      const match=url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
      if(match) return <iframe src={`https://www.youtube.com/embed/${match[1]}?autoplay=1`} style={{width:"100%",height:"100%",border:"none"}} allowFullScreen allow="autoplay"/>;
    }
    return (
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16,padding:24}}>
        <div style={{fontSize:13,color:"#A0714F",textAlign:"center",lineHeight:1.6}}>Preview tidak tersedia.<br/>Tekan butang di bawah untuk tonton.</div>
        <button onClick={()=>window.open(v.url,"_blank")} style={{background:p.grad,border:"none",borderRadius:12,padding:"11px 22px",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>Buka Video →</button>
      </div>
    );
  };
  return (
    <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(44,26,14,0.88)",backdropFilter:"blur(20px)",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:"100%",maxWidth:520,display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,padding:"0 4px"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:700,color:"#F5EFE6",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{v.title}</div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
            <span style={{background:`${p.accent}33`,border:`1px solid ${p.accent}55`,borderRadius:5,padding:"2px 7px",fontSize:9,fontWeight:800,color:p.accent}}>{v.platform?.toUpperCase()}</span>
            <span style={{fontSize:11,color:"rgba(245,239,230,0.5)"}}>{v.category}</span>
          </div>
        </div>
        <button onClick={onClose} style={{width:34,height:34,borderRadius:"50%",flexShrink:0,marginLeft:12,
          background:"rgba(245,239,230,0.1)",border:"1px solid rgba(245,239,230,0.2)",
          color:"rgba(245,239,230,0.7)",cursor:"pointer",fontSize:16,
          display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
      </div>
      <div style={{width:"100%",maxWidth:520,borderRadius:20,overflow:"hidden",
        background:"#EDE0D0",border:"1px solid rgba(44,26,14,0.1)",
        boxShadow:"0 24px 60px rgba(44,26,14,0.4)",
        aspectRatio:"9/16",maxHeight:"65vh",position:"relative"}}>
        {getEmbed()}
      </div>
      <div style={{width:"100%",maxWidth:520,display:"flex",gap:10,marginTop:12}}>
        <button onClick={()=>window.open(v.url,"_blank")} style={{flex:1,background:"rgba(245,239,230,0.1)",border:"1px solid rgba(245,239,230,0.15)",borderRadius:12,padding:"11px",color:"rgba(245,239,230,0.8)",fontSize:13,fontWeight:600,cursor:"pointer"}}>🔗 Buka Asal</button>
        <button onClick={()=>navigator.clipboard?.writeText(v.url)} style={{flex:1,background:"rgba(245,239,230,0.1)",border:"1px solid rgba(245,239,230,0.15)",borderRadius:12,padding:"11px",color:"rgba(245,239,230,0.8)",fontSize:13,fontWeight:600,cursor:"pointer"}}>📋 Copy Link</button>
      </div>
    </div>
  );
}

// ── VIDEO CARD ──
function Card({v,onUpdate,onDelete,onPlay,t}) {
  const [showC,setShowC]=useState(false);
  const [txt,setTxt]=useState("");
  const ref=useRef(null);
  const p=P[v.platform]||P.TikTok;
  const s=STATUS_CFG[v.status]||STATUS_CFG.Saved;

  const tilt=e=>{ const r=ref.current.getBoundingClientRect(); const x=(e.clientX-r.left)/r.width-0.5; const y=(e.clientY-r.top)/r.height-0.5; ref.current.style.transform=`perspective(900px) rotateY(${x*8}deg) rotateX(${-y*8}deg) scale(1.01)`; };
  const resetTilt=()=>{ ref.current.style.transform=""; };
  const cycleStatus=()=>{ const i=STATUSES_EN.indexOf(v.status); onUpdate(v.key,{status:STATUSES_EN[(i+1)%STATUSES_EN.length]}); };
  const postComment=()=>{ if(!txt.trim()) return; onUpdate(v.key,{comments:[...(v.comments||[]),txt.trim()]}); setTxt(""); };

  return (
    <div ref={ref} className="card" onMouseMove={tilt} onMouseLeave={resetTilt} style={{transition:"transform 0.18s ease"}}>
      <div style={{background:"rgba(237,220,200,0.85)",backdropFilter:"blur(20px)",
        border:"1px solid rgba(44,26,14,0.1)",
        borderTop:"1px solid rgba(255,255,255,0.6)",
        borderLeft:"1px solid rgba(255,255,255,0.5)",
        borderRadius:20,overflow:"hidden",
        boxShadow:"0 4px 20px rgba(44,26,14,0.1)",transition:"box-shadow 0.25s"}}
        onMouseEnter={e=>e.currentTarget.style.boxShadow=`0 12px 36px rgba(44,26,14,0.18),0 0 0 1.5px ${p.accent}44`}
        onMouseLeave={e=>e.currentTarget.style.boxShadow="0 4px 20px rgba(44,26,14,0.1)"}>

        {/* Thumbnail */}
        <div onClick={()=>onPlay(v)} style={{height:170,cursor:"pointer",position:"relative",overflow:"hidden",
          background:`linear-gradient(135deg,#D4B896,${p.accent}22)`}}>
          {v.thumbnail && <img src={v.thumbnail} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",opacity:0.85}} onError={e=>e.target.style.display="none"}/>}
          <div style={{position:"absolute",inset:0,background:v.thumbnail?"rgba(44,26,14,0.2)":`radial-gradient(ellipse at 75% 25%,${p.accent}20,transparent 60%)`}}/>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{width:50,height:50,borderRadius:"50%",
              background:"rgba(245,239,230,0.3)",border:"1.5px solid rgba(245,239,230,0.6)",
              backdropFilter:"blur(10px)",display:"flex",alignItems:"center",justifyContent:"center",
              color:"rgba(44,26,14,0.8)",fontSize:18,transition:"all 0.2s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="rgba(245,239,230,0.5)";e.currentTarget.style.transform="scale(1.1)";}}
              onMouseLeave={e=>{e.currentTarget.style.background="rgba(245,239,230,0.3)";e.currentTarget.style.transform="";}}>▶</div>
          </div>
          <div style={{position:"absolute",top:10,left:10,right:10,display:"flex",justifyContent:"space-between"}}>
            <PTag platform={v.platform}/>
            <span style={{background:"rgba(44,26,14,0.4)",backdropFilter:"blur(8px)",border:"1px solid rgba(245,239,230,0.2)",borderRadius:6,padding:"3px 8px",fontSize:9,color:"rgba(245,239,230,0.9)"}}>{v.category}</span>
          </div>
          <div style={{position:"absolute",bottom:0,left:0,right:0,height:48,background:"linear-gradient(to top,rgba(237,220,200,0.9),transparent)"}}/>
        </div>

        {/* Body */}
        <div style={{padding:"16px 18px 18px"}}>
          <div style={{fontSize:15,fontWeight:800,color:"#2C1A0E",lineHeight:1.45,marginBottom:12,letterSpacing:-0.3}}>{v.title}</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <Stars val={v.rating||0} onChange={r=>onUpdate(v.key,{rating:r})}/>
            <STag status={v.status} onClick={cycleStatus}/>
          </div>
          {v.notes && (
            <div style={{background:"rgba(44,26,14,0.05)",border:"1px solid rgba(44,26,14,0.08)",
              borderLeft:`2.5px solid ${p.accent}66`,borderRadius:8,padding:"8px 10px",
              fontSize:12,color:"#6B4226",lineHeight:1.55,marginBottom:10}}>{v.notes}</div>
          )}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:11,color:"#A0714F"}}><strong style={{color:"#6B4226",fontWeight:700}}>{v.savedBy}</strong> · {v.savedAt}</span>
            <div style={{display:"flex",gap:12}}>
              <button onClick={()=>setShowC(!showC)} style={{background:"none",border:"none",cursor:"pointer",padding:0,fontSize:12,color:showC?p.accent:"#A0714F",transition:"color 0.15s"}}>💬 {(v.comments||[]).length}</button>
              <button onClick={()=>onDelete(v.key)} style={{background:"none",border:"none",cursor:"pointer",padding:0,fontSize:12,color:"#A0714F",transition:"color 0.15s"}}
                onMouseEnter={e=>e.currentTarget.style.color="#C0392B"}
                onMouseLeave={e=>e.currentTarget.style.color="#A0714F"}>✕</button>
            </div>
          </div>
          {showC && (
            <div style={{marginTop:10}}>
              {(v.comments||[]).map((c,i)=>(
                <div key={i} style={{background:"rgba(44,26,14,0.05)",border:"1px solid rgba(44,26,14,0.08)",borderRadius:8,padding:"6px 10px",fontSize:12,color:"#6B4226",marginBottom:4}}>{c}</div>
              ))}
              <div style={{display:"flex",gap:6,marginTop:6}}>
                <input value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&postComment()} placeholder={t.comment}
                  style={{flex:1,background:"rgba(44,26,14,0.06)",border:"1px solid rgba(44,26,14,0.1)",borderRadius:8,padding:"7px 10px",color:"#2C1A0E",fontSize:12,outline:"none"}}
                  onFocus={e=>e.target.style.border=`1px solid ${p.accent}66`}
                  onBlur={e=>e.target.style.border="1px solid rgba(44,26,14,0.1)"}/>
                <button onClick={postComment} style={{background:p.grad,border:"none",borderRadius:8,padding:"7px 13px",color:"#fff",fontSize:12,fontWeight:800,cursor:"pointer"}}>↑</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── ADD MODAL ──
function Modal({onClose,t,userName}) {
  const [f,setF]=useState({url:"",title:"",platform:"TikTok",category:"Hook",notes:"",rating:3,savedBy:userName||"Ali"});
  const [saving,setSaving]=useState(false);
  const [thumb,setThumb]=useState(null);
  const [fetching,setFetching]=useState(false);
  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  const p=P[f.platform];

  useEffect(()=>{
    if(!f.url.trim()){setThumb(null);return;}
    const timer=setTimeout(async()=>{
      setFetching(true);
      try {
        if(f.url.includes("tiktok.com")){
          const res=await fetch(`https://www.tiktok.com/oembed?url=${encodeURIComponent(f.url)}`);
          const d=await res.json();
          if(d.thumbnail_url) setThumb(d.thumbnail_url);
          if(d.title&&!f.title) setF(x=>({...x,title:d.title.slice(0,80)}));
        }
      } catch(e){}
      setFetching(false);
    },800);
    return ()=>clearTimeout(timer);
  },[f.url]);

  const submit=async()=>{
    if(!f.url.trim()||!f.title.trim()) return;
    setSaving(true);
    try {
      await db.ref("videos").push({...f,status:"Saved",comments:[],thumbnail:thumb||null,
        savedAt:new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"}),createdAt:Date.now()});
      onClose();
    } catch(e){}
    setSaving(false);
  };

  const iStyle={width:"100%",background:"rgba(44,26,14,0.06)",border:"1px solid rgba(44,26,14,0.1)",borderRadius:10,padding:"10px 12px",color:"#2C1A0E",fontSize:13,outline:"none",transition:"border 0.15s"};

  return (
    <div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(44,26,14,0.45)",backdropFilter:"blur(10px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:"100%",maxWidth:520,background:"rgba(245,239,230,0.98)",backdropFilter:"blur(32px)",borderRadius:"22px 22px 0 0",borderTop:"1.5px solid rgba(255,255,255,0.7)",padding:"0 22px 40px",maxHeight:"92vh",overflowY:"auto",animation:"slideUp 0.3s cubic-bezier(0.32,0.72,0,1)",boxShadow:"0 -8px 40px rgba(44,26,14,0.2)"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"14px 0 10px"}}>
          <div style={{width:36,height:4,borderRadius:2,background:"rgba(44,26,14,0.2)"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <div>
            <div style={{fontSize:20,fontWeight:900,color:"#2C1A0E",letterSpacing:-0.5}}>{t.saveVideo}</div>
            <div style={{fontSize:11,color:"#A0714F",marginTop:2}}>{t.saveSubtitle}</div>
          </div>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:"50%",background:"rgba(44,26,14,0.08)",border:"1px solid rgba(44,26,14,0.12)",color:"#6B4226",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>

        {/* Platform */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,fontWeight:700,color:"#A0714F",letterSpacing:1.8,marginBottom:8}}>PLATFORM</div>
          <div style={{display:"flex",gap:8}}>
            {["TikTok","Instagram","Facebook"].map(pl=>{
              const pp=P[pl];const sel=f.platform===pl;
              return <button key={pl} onClick={()=>set("platform",pl)} style={{flex:1,padding:"10px 0",background:sel?`${pp.accent}14`:"rgba(44,26,14,0.05)",border:`1.5px solid ${sel?pp.accent+"55":"rgba(44,26,14,0.1)"}`,borderRadius:12,cursor:"pointer",color:sel?pp.accent:"#A0714F",fontSize:12,fontWeight:800,boxShadow:sel?`0 4px 14px ${pp.glow}`:"none",transition:"all 0.2s"}}>{pl}</button>;
            })}
          </div>
        </div>

        {/* Thumbnail preview */}
        {(thumb||fetching) && (
          <div style={{marginBottom:16,borderRadius:12,overflow:"hidden",position:"relative",height:130,background:"rgba(44,26,14,0.06)",border:"1px solid rgba(44,26,14,0.1)"}}>
            {fetching&&!thumb && <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:24,height:24,borderRadius:"50%",border:"2px solid rgba(44,26,14,0.1)",borderTop:"2px solid #A0714F",animation:"spin 0.8s linear infinite"}}/></div>}
            {thumb && <img src={thumb} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={()=>setThumb(null)}/>}
            <div style={{position:"absolute",top:8,right:8,background:"rgba(44,26,14,0.5)",borderRadius:6,padding:"2px 8px",fontSize:10,color:"rgba(245,239,230,0.9)"}}>AUTO</div>
          </div>
        )}

        {[{label:t.urlLabel,key:"url",ph:t.urlPh,ta:false},{label:t.titleLabel,key:"title",ph:t.titlePh,ta:false},{label:t.savedByLabel,key:"savedBy",ph:t.savedByPh,ta:false},{label:t.notesLabel,key:"notes",ph:t.notesPh,ta:true}].map(({label,key,ph,ta})=>(
          <div key={key} style={{marginBottom:14}}>
            <div style={{fontSize:10,fontWeight:700,color:"#A0714F",letterSpacing:1.8,marginBottom:6}}>{label}</div>
            {ta ? <textarea value={f[key]} onChange={e=>set(key,e.target.value)} placeholder={ph} rows={2} style={{...iStyle,resize:"none"}} onFocus={e=>{e.target.style.border=`1px solid ${p.accent}66`;}} onBlur={e=>{e.target.style.border="1px solid rgba(44,26,14,0.1)";}}/>
               : <input value={f[key]} onChange={e=>set(key,e.target.value)} placeholder={ph} style={iStyle} onFocus={e=>{e.target.style.border=`1px solid ${p.accent}66`;}} onBlur={e=>{e.target.style.border="1px solid rgba(44,26,14,0.1)";}}/>}
          </div>
        ))}

        <div style={{display:"flex",gap:12,marginBottom:22,alignItems:"flex-end"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:10,fontWeight:700,color:"#A0714F",letterSpacing:1.8,marginBottom:6}}>{t.catLabel}</div>
            <select value={f.category} onChange={e=>set("category",e.target.value)} style={{...iStyle,cursor:"pointer"}}>
              {CATEGORIES.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div style={{paddingBottom:8}}>
            <div style={{fontSize:10,fontWeight:700,color:"#A0714F",letterSpacing:1.8,marginBottom:8}}>{t.ratingLabel}</div>
            <Stars val={f.rating} onChange={r=>set("rating",r)}/>
          </div>
        </div>

        <button onClick={submit} disabled={saving} style={{width:"100%",background:saving?"rgba(44,26,14,0.1)":p.grad,border:"none",borderRadius:14,padding:"14px",color:saving?"#A0714F":"#fff",fontSize:14,fontWeight:800,cursor:saving?"not-allowed":"pointer",boxShadow:saving?"none":`0 8px 20px ${p.glow}`,transition:"all 0.15s"}}>
          {saving?t.saving:t.simpan}
        </button>
      </div>
    </div>
  );
}

// ── MAIN APP ──
function App() {
  const [lang,setLang]=useState("ms");
  const t=LANG[lang];
  const [userName,setUserName]=useState(()=>localStorage.getItem("tv_username")||null);
  const [videos,setVideos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [filter,setFilter]=useState("All");
  const [search,setSearch]=useState("");
  const [sort,setSort]=useState("latest");
  const [modal,setModal]=useState(false);
  const [playing,setPlaying]=useState(null);
  const [notif,setNotif]=useState(null);
  const [toast,setToast]=useState(null);

  useEffect(()=>{
    const ref=db.ref("videos");
    ref.on("value",snap=>{
      try {
        const d=snap.val();
        if(d){
          const arr=Object.entries(d).map(([k,v])=>({...v,key:k})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
          setVideos(prev=>{
            if(prev.length>0&&arr.length>prev.length){
              const newest=arr[0];
              const myName=localStorage.getItem("tv_username");
              if(newest.savedBy!==myName) setNotif(newest);
            }
            return arr;
          });
        } else setVideos([]);
        setLoading(false);
      } catch(e){setError(e.message);setLoading(false);}
    },e=>{setError(e.message);setLoading(false);});
    return ()=>ref.off();
  },[]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2000);};
  const updateVideo=(key,ch)=>{db.ref(`videos/${key}`).update(ch);showToast(t.updated);};
  const deleteVideo=key=>{db.ref(`videos/${key}`).remove();showToast(t.removed);};

  const list=videos
    .filter(v=>filter==="All"||v.platform===filter)
    .filter(v=>!search||v.title?.toLowerCase().includes(search.toLowerCase())||v.notes?.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>sort==="rating"?(b.rating||0)-(a.rating||0):(b.createdAt||0)-(a.createdAt||0));

  const stats={total:videos.length,prog:videos.filter(v=>v.status==="In Progress").length,used:videos.filter(v=>v.status==="Used").length};

  return (
    <div style={{minHeight:"100vh",background:"#F5EFE6",color:"#2C1A0E",position:"relative"}}>

      {/* Ambient */}
      <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",overflow:"hidden"}}>
        {[{s:420,t:"-5%",l:"55%",c:"#E8D5BC",d:9},{s:300,t:"45%",l:"-5%",c:"#DFC9AB",d:11},{s:240,t:"68%",l:"68%",c:"#EAD7C0",d:8}].map((b,i)=>(
          <div key={i} style={{position:"absolute",width:b.s,height:b.s,top:b.t,left:b.l,borderRadius:"50%",background:`radial-gradient(circle,${b.c} 0%,transparent 68%)`,filter:"blur(70px)",opacity:0.6,animation:`drift ${b.d}s ease-in-out infinite`,animationDelay:`${i}s`}}/>
        ))}
      </div>

      {/* Gates & overlays */}
      {!userName && <NameGate onEnter={n=>{setUserName(n);localStorage.setItem("tv_username",n);}}/>}
      <NotifBanner notif={notif} onClose={()=>setNotif(null)}/>
      {toast && <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",zIndex:350,background:"rgba(237,224,208,0.97)",border:"1px solid rgba(44,26,14,0.12)",borderRadius:20,padding:"8px 20px",fontSize:13,fontWeight:600,color:"#2C1A0E",animation:"pop 0.2s ease",boxShadow:"0 6px 24px rgba(44,26,14,0.15)",whiteSpace:"nowrap"}}>{toast}</div>}

      {/* ══ STICKY HEADER ══ */}
      <div style={{position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 20px rgba(44,26,14,0.1)"}}>

        {/* Dark brand bar */}
        <div style={{background:"linear-gradient(135deg,#2C1A0E 0%,#4A2C1A 100%)",padding:"10px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            
            <div style={{lineHeight:1}}>
              <div style={{fontSize:18,fontWeight:900,letterSpacing:-0.8,background:"linear-gradient(90deg,#F5EFE6 0%,#D4B896 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>TrendVault</div>
              
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            {[{v:stats.total,c:"#D4B896"},{v:stats.prog,c:"#F5C518"},{v:stats.used,c:"#4ADE80"}].map((s,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,0.09)",border:"1px solid rgba(255,255,255,0.14)",borderRadius:20,padding:"3px 10px",fontSize:13,fontWeight:900,color:s.c,lineHeight:1}}>{s.v}</div>
            ))}
            <button onClick={()=>setModal(true)} style={{background:"linear-gradient(135deg,#FE2C55,#D81B60)",border:"none",borderRadius:10,padding:"8px 15px",color:"#fff",fontWeight:900,fontSize:12,letterSpacing:0.3,cursor:"pointer",whiteSpace:"nowrap",boxShadow:"0 4px 16px rgba(254,44,85,0.5)",transition:"all 0.15s"}}
              onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.boxShadow="0 8px 22px rgba(254,44,85,0.6)";}}
              onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="0 4px 16px rgba(254,44,85,0.5)";}}>
              {t.save}
            </button>
          </div>
        </div>

        {/* Light bar — lang + user + filters */}
        <div style={{background:"rgba(240,230,215,0.96)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(44,26,14,0.08)"}}>
          {/* Lang + user row */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 18px 6px"}}>
            {/* Lang pills */}
            <div style={{display:"flex",gap:4}}>
              {Object.entries(LANG_LABELS).map(([code,label])=>(
                <button key={code} onClick={()=>setLang(code)} style={{
                  padding:"5px 13px",borderRadius:20,fontSize:11,fontWeight:800,cursor:"pointer",
                  border:`1px solid ${lang===code?"rgba(44,26,14,0.25)":"rgba(44,26,14,0.08)"}`,
                  background:lang===code?"#2C1A0E":"rgba(44,26,14,0.04)",
                  color:lang===code?"#F5EFE6":"#A0714F",
                  boxShadow:lang===code?"0 2px 8px rgba(44,26,14,0.2)":"none",
                  transition:"all 0.15s"}}>{label}</button>
              ))}
            </div>

            {/* User chip */}
            {userName && (
              <div style={{display:"flex",alignItems:"center",gap:6,
                background:"rgba(44,26,14,0.06)",border:"1px solid rgba(44,26,14,0.1)",
                borderRadius:20,padding:"4px 12px 4px 5px"}}>
                <div style={{width:22,height:22,borderRadius:"50%",
                  background:"linear-gradient(135deg,#2C1A0E,#8B4513)",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:10,fontWeight:900,color:"#F5EFE6",flexShrink:0}}>
                  {userName.charAt(0).toUpperCase()}
                </div>
                <span style={{fontSize:12,color:"#4A2C1A",fontWeight:700,maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{userName}</span>
                <button onClick={()=>{localStorage.removeItem("tv_username");setUserName(null);}}
                  style={{background:"none",border:"none",cursor:"pointer",fontSize:10,
                    color:"#B8916F",padding:0,marginLeft:2,flexShrink:0}}>✕</button>
              </div>
            )}
          </div>

          {/* Filter row */}
          <div style={{display:"flex",alignItems:"center",gap:7,padding:"4px 18px 10px",overflowX:"auto",WebkitOverflowScrolling:"touch",scrollbarWidth:"none",msOverflowStyle:"none"}}>
            {["All","TikTok","Instagram","Facebook"].map(pl=>{
              const pp=P[pl];const sel=filter===pl;
              return <button key={pl} onClick={()=>setFilter(pl)} style={{background:sel?(pp?`${pp.accent}18`:"rgba(44,26,14,0.12)"):"rgba(44,26,14,0.05)",border:`1.5px solid ${sel?(pp?.accent+"44"||"rgba(44,26,14,0.3)"):"rgba(44,26,14,0.08)"}`,borderRadius:20,padding:"6px 16px",color:sel?(pp?.accent||"#2C1A0E"):"#8B6347",fontSize:12,fontWeight:800,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,boxShadow:sel&&pp?`0 0 12px ${pp.glow}`:"none",transition:"all 0.18s"}}>{pl==="All"?t.all:pl}</button>;
            })}
            <div style={{width:1,height:18,background:"rgba(44,26,14,0.1)",flexShrink:0}}/>
            <div style={{position:"relative",flexShrink:0}}>
              <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:12,color:"#A0714F",pointerEvents:"none"}}>⌕</span>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t.search}
                style={{background:"rgba(44,26,14,0.05)",border:"1.5px solid rgba(44,26,14,0.08)",borderRadius:20,padding:"5px 12px 5px 26px",color:"#2C1A0E",fontSize:12,outline:"none",width:120,transition:"all 0.2s"}}
                onFocus={e=>{e.target.style.border="1.5px solid rgba(44,26,14,0.25)";e.target.style.width="150px";}}
                onBlur={e=>{e.target.style.border="1.5px solid rgba(44,26,14,0.08)";e.target.style.width="120px";}}/>
            </div>
            <select value={sort} onChange={e=>setSort(e.target.value)} style={{background:"rgba(44,26,14,0.05)",border:"1.5px solid rgba(44,26,14,0.08)",borderRadius:20,padding:"5px 10px",color:"#8B6347",fontSize:12,outline:"none",cursor:"pointer",flexShrink:0}}>
              <option value="latest">{t.latest}</option>
              <option value="rating">{t.topRated}</option>
            </select>
          </div>
        </div>
      </div>

      {/* ══ CONTENT ══ */}
      <div style={{maxWidth:1100,margin:"0 auto",padding:"24px 18px 60px",position:"relative",zIndex:1}}>
        {loading ? (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh",gap:16}}>
            <div style={{width:40,height:40,borderRadius:"50%",border:"3px solid rgba(44,26,14,0.1)",borderTop:"3px solid #A0714F",animation:"spin 0.8s linear infinite"}}/>
            <div style={{fontSize:13,color:"#A0714F"}}>{t.connecting}</div>
          </div>
        ) : error ? (
          <div style={{textAlign:"center",padding:"60px 20px"}}>
            <div style={{fontSize:14,color:"#C0392B",marginBottom:8}}>⚠️ Firebase Error</div>
            <div style={{fontSize:12,color:"#A0714F"}}>{error}</div>
          </div>
        ) : list.length===0 ? (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"65vh",padding:"40px 20px"}}>
            <div style={{position:"relative",width:200,height:200,marginBottom:36}}>
              <div style={{position:"absolute",inset:0,borderRadius:"50%",border:"1px solid rgba(44,26,14,0.08)",animation:"drift 8s ease-in-out infinite"}}/>
              <div style={{position:"absolute",inset:16,borderRadius:"50%",border:"1px solid rgba(254,44,85,0.12)",animation:"drift 6s ease-in-out infinite reverse"}}/>
              <div style={{position:"absolute",inset:32,borderRadius:"50%",border:"1px solid rgba(193,53,132,0.12)",animation:"drift 10s ease-in-out infinite"}}/>
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{position:"relative"}}>
                  <div style={{width:76,height:76,borderRadius:"50%",background:"rgba(44,26,14,0.06)",border:"1px solid rgba(44,26,14,0.1)",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(10px)"}}>
                    <div style={{width:44,height:44,borderRadius:"50%",background:"linear-gradient(135deg,#2C1A0E,#8B4513)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 0 24px rgba(44,26,14,0.3)",fontSize:20}}>☕</div>
                  </div>
                  <div style={{position:"absolute",top:-3,right:-3,width:18,height:18,borderRadius:"50%",background:"#FE2C55",boxShadow:"0 0 10px rgba(254,44,85,0.5)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"#fff",fontWeight:900}}>TK</div>
                  <div style={{position:"absolute",bottom:-3,left:-5,width:18,height:18,borderRadius:"50%",background:"linear-gradient(135deg,#833AB4,#E1306C)",boxShadow:"0 0 10px rgba(193,53,132,0.5)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"#fff",fontWeight:900}}>IG</div>
                  <div style={{position:"absolute",top:-3,left:-8,width:18,height:18,borderRadius:"50%",background:"#1877F2",boxShadow:"0 0 10px rgba(24,119,242,0.5)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"#fff",fontWeight:900}}>FB</div>
                </div>
              </div>
            </div>
            <div style={{textAlign:"center",maxWidth:260}}>
              <div style={{fontSize:22,fontWeight:900,color:"#2C1A0E",letterSpacing:-0.5,marginBottom:10}}>{t.vaultEmpty}</div>
              <div style={{fontSize:13,color:"#A0714F",lineHeight:1.6,marginBottom:28}}>{t.vaultDesc}</div>
              <button onClick={()=>setModal(true)} style={{background:"linear-gradient(135deg,#2C1A0E,#8B4513)",border:"none",borderRadius:14,padding:"12px 28px",color:"#F5EFE6",fontWeight:800,fontSize:14,cursor:"pointer",boxShadow:"0 8px 24px rgba(44,26,14,0.3)",transition:"all 0.2s"}}
                onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 12px 30px rgba(44,26,14,0.4)";}}
                onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="0 8px 24px rgba(44,26,14,0.3)";}}>
                {t.saveFirst}
              </button>
            </div>
          </div>
        ) : (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:20}}>
            {list.map(v=><Card key={v.key} v={v} onUpdate={updateVideo} onDelete={deleteVideo} onPlay={setPlaying} t={t}/>)}
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{textAlign:"center",padding:"8px 16px 28px",position:"relative",zIndex:1}}>
        <div style={{fontSize:10,color:"#C4A882",letterSpacing:1.5,fontWeight:600}}>© TRENDVAULT · ALI × TMOMO BUDDY</div>
      </div>

      {playing && <VideoPlayer v={playing} onClose={()=>setPlaying(null)}/>}
      {modal && <Modal onClose={()=>setModal(false)} t={t} userName={userName}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
