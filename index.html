function Stars({val,onChange}) {
  const [h,setH] = useState(0);
  return (
    <div style={{display:"flex",gap:2}}>
      {[1,2,3,4,5].map(s=>(
        <span key={s}
          onMouseEnter={()=>onChange&&setH(s)}
          onMouseLeave={()=>onChange&&setH(0)}
          onClick={()=>onChange&&onChange(s)}
          style={{fontSize:15,cursor:onChange?"pointer":"default",
            color:s<=(h||val)?"#C47B2B":"rgba(44,26,14,0.12)",
            display:"inline-block",transition:"all 0.1s",
            transform:s<=(h||val)?"scale(1.2)":"scale(1)"}}>★</span>
      ))}
    </div>
  );
}

function Card({v,onUpdate,onDelete,t,onPlay}) {
  const [showC,setShowC] = useState(false);
  const [txt,setTxt]     = useState("");
  const cardRef = useRef(null);
  const p = P[v.platform] || P.TikTok;
  const s = STATUS[v.status] || STATUS.Saved;

  const tilt = e => {
    const r = cardRef.current.getBoundingClientRect();
    const x = (e.clientX-r.left)/r.width - 0.5;
    const y = (e.clientY-r.top)/r.height  - 0.5;
    cardRef.current.style.transform = `perspective(800px) rotateY(${x*8}deg) rotateX(${-y*8}deg) scale(1.01)`;
  };
  const resetTilt = () => { cardRef.current.style.transform = ""; };

  const cycleStatus = () => {
    const i = STATUSES.indexOf(v.status);
    onUpdate(v.key,{status:STATUSES[(i+1)%STATUSES.length]});
  };

  const postComment = () => {
    if(!txt.trim()) return;
    onUpdate(v.key,{comments:[...(v.comments||[]),txt.trim()]});
    setTxt("");
  };

  return (
    <div ref={cardRef} className="card" onMouseMove={tilt} onMouseLeave={resetTilt}
      style={{transition:"transform 0.15s ease",borderRadius:20,overflow:"hidden",
        background:"rgba(240,225,205,0.85)",
        border:"1px solid rgba(44,26,14,0.1)",
        boxShadow:"0 4px 24px rgba(44,26,14,0.2)"}}>

      {/* Thumbnail */}
      <div onClick={()=>onPlay(v)}
        style={{height:155,cursor:"pointer",position:"relative",overflow:"hidden",
          background:`linear-gradient(135deg,#D4B896,${p.accent}22)`}}>
        {v.thumbnail && (
          <img src={v.thumbnail} alt="thumb"
            style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",opacity:0.85}}
            onError={e=>e.target.style.display="none"}/>
        )}
        <div style={{position:"absolute",inset:0,background:v.thumbnail?"rgba(44,26,14,0.12)":`radial-gradient(ellipse at 75% 25%,${p.accent}20,transparent 60%)`}}/>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{width:50,height:50,borderRadius:"50%",
            background:"rgba(44,26,14,0.08)",border:"1.5px solid rgba(255,255,255,0.2)",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:18,color:"rgba(255,255,255,0.8)",transition:"all 0.2s"}}
            onMouseEnter={e=>{e.currentTarget.style.background="rgba(44,26,14,0.12)";e.currentTarget.style.transform="scale(1.1)";}}
            onMouseLeave={e=>{e.currentTarget.style.background="rgba(44,26,14,0.1)";e.currentTarget.style.transform="";}}>▶</div>
        </div>
        <div style={{position:"absolute",top:10,left:10,right:10,display:"flex",justifyContent:"space-between"}}>
          <span style={{background:`${p.accent}22`,border:`1px solid ${p.accent}55`,
            borderRadius:6,padding:"3px 8px",fontSize:9,fontWeight:800,letterSpacing:1.2,color:p.accent}}>
            {v.platform?.toUpperCase()}
          </span>
          <span style={{background:"rgba(44,26,14,0.2)",border:"1px solid rgba(44,26,14,0.12)",
            borderRadius:6,padding:"3px 8px",fontSize:9,color:"rgba(255,255,255,0.7)"}}>
            {v.category}
          </span>
        </div>
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:48,
          background:"linear-gradient(to top,rgba(28,28,30,0.95),transparent)"}}/>
      </div>

      {/* Body */}
      <div style={{padding:"14px 16px 16px"}}>
        <div style={{fontSize:14,fontWeight:700,color:"#2C1A0E",lineHeight:1.45,marginBottom:10,letterSpacing:-0.2}}>
          {v.title}
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <Stars val={v.rating||0} onChange={r=>onUpdate(v.key,{rating:r})}/>
          <span onClick={cycleStatus} style={{background:s.bg,border:`1px solid ${s.dot}44`,
            borderRadius:6,padding:"3px 10px",fontSize:10,fontWeight:700,color:s.color,
            cursor:"pointer",userSelect:"none",display:"inline-flex",alignItems:"center",gap:5}}>
            <span style={{width:5,height:5,borderRadius:"50%",background:s.dot,
              animation:v.status==="In Progress"?"blink 1.3s infinite":"none"}}/>
            {v.status}
          </span>
        </div>

        {v.notes && (
          <div style={{background:"rgba(44,26,14,0.04)",border:"1px solid rgba(255,255,255,0.07)",
            borderLeft:`2px solid ${p.accent}66`,borderRadius:8,padding:"8px 10px",
            fontSize:12,color:"#6B4226",lineHeight:1.5,marginBottom:10}}>{v.notes}</div>
        )}

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,color:"#B8916F"}}>
            <strong style={{color:"#A0714F"}}>{v.savedBy}</strong> · {v.savedAt}
          </span>
          <div style={{display:"flex",gap:12}}>
            <button onClick={()=>setShowC(!showC)}
              style={{background:"none",border:"none",cursor:"pointer",padding:0,
                fontSize:12,color:showC?p.accent:"#B8916F",transition:"color 0.15s"}}>
              💬 {(v.comments||[]).length}
            </button>
            <button onClick={()=>onDelete(v.key)}
              style={{background:"none",border:"none",cursor:"pointer",padding:0,
                fontSize:12,color:"#B8916F",transition:"color 0.15s"}}
              onMouseEnter={e=>e.currentTarget.style.color="#ff453a"}
              onMouseLeave={e=>e.currentTarget.style.color="#B8916F"}>✕</button>
          </div>
        </div>

        {showC && (
          <div style={{marginTop:10}}>
            {(v.comments||[]).map((c,i)=>(
              <div key={i} style={{background:"rgba(44,26,14,0.04)",border:"1px solid rgba(255,255,255,0.07)",
                borderRadius:8,padding:"6px 10px",fontSize:12,color:"#6B4226",marginBottom:4}}>{c}</div>
            ))}
            <div style={{display:"flex",gap:6,marginTop:6}}>
              <input value={txt} onChange={e=>setTxt(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&postComment()}
                placeholder={t.comment}
                style={{flex:1,background:"rgba(44,26,14,0.06)",border:"1px solid rgba(44,26,14,0.12)",
                  borderRadius:8,padding:"7px 10px",color:"#2C1A0E",fontSize:12,outline:"none"}}/>
              <button onClick={postComment}
                style={{background:p.grad,border:"none",borderRadius:8,padding:"7px 13px",
                  color:"#fff",fontSize:12,fontWeight:800,cursor:"pointer"}}>↑</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Modal({onAdd,onClose,t,lang,userName}) {
  const [f,setF] = useState({url:"",title:"",platform:"TikTok",category:"Hook",notes:"",rating:3,savedBy:userName||"Ali"});
  const [saving,setSaving] = useState(false);
  const [thumb,setThumb]   = useState(null);
  const [fetching,setFetching] = useState(false);
  const set = (k,v) => setF(x=>({...x,[k]:v}));
  const p = P[f.platform];

  // Auto-fetch thumbnail when URL changes
  useEffect(()=>{
    if(!f.url.trim()) { setThumb(null); return; }
    const timer = setTimeout(async()=>{
      setFetching(true);
      try {
        // TikTok oEmbed
        if(f.url.includes("tiktok.com")){
          const res = await fetch(`https://www.tiktok.com/oembed?url=${encodeURIComponent(f.url)}`);
          const d = await res.json();
          if(d.thumbnail_url) setThumb(d.thumbnail_url);
          if(d.title && !f.title) setF(x=>({...x,title:d.title.slice(0,80)}));
        }
        // Instagram — no public oEmbed without token, skip
        // Facebook — no public oEmbed, skip
      } catch(e){ console.log("oEmbed failed:",e); }
      setFetching(false);
    }, 800);
    return ()=>clearTimeout(timer);
  },[f.url]);

  const submit = async() => {
    if(!f.url.trim()||!f.title.trim()) return;
    setSaving(true);
    try {
      await db.ref("videos").push({
        ...f, status:"Saved", comments:[],
        thumbnail: thumb || null,
        savedAt: new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"}),
        createdAt: Date.now()
      });
      onClose();
    } catch(e){ console.error(e); }
    setSaving(false);
  };

  const inp = {
    width:"100%",background:"rgba(44,26,14,0.06)",
    border:"1px solid rgba(44,26,14,0.12)",borderRadius:10,
    padding:"10px 12px",color:"#2C1A0E",fontSize:13,outline:"none"
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:200,
      background:"rgba(44,26,14,0.55)",backdropFilter:"blur(12px)",
      display:"flex",alignItems:"flex-end",justifyContent:"center"}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:"100%",maxWidth:520,
        background:"#E8D5BC",borderRadius:"22px 22px 0 0",
        borderTop:"1px solid rgba(255,255,255,0.1)",
        padding:"0 22px 40px",maxHeight:"92vh",overflowY:"auto",
        animation:"slideUp 0.3s cubic-bezier(0.32,0.72,0,1)"}}>

        <div style={{display:"flex",justifyContent:"center",padding:"14px 0 10px"}}>
          <div style={{width:36,height:4,borderRadius:2,background:"rgba(44,26,14,0.2)"}}/>
        </div>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <div>
            <div style={{fontSize:20,fontWeight:900,color:"#2C1A0E",letterSpacing:-0.5}}>{t.saveVideo}</div>
            <div style={{fontSize:11,color:"#B8916F",marginTop:2}}>{t.saveSubtitle}</div>
          </div>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:"50%",
            background:"rgba(44,26,14,0.08)",border:"1px solid rgba(44,26,14,0.12)",
            color:"#6B4226",cursor:"pointer",fontSize:14,
            display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>

        {/* Platform */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,fontWeight:700,color:"#B8916F",letterSpacing:1.8,marginBottom:8}}>PLATFORM</div>
          <div style={{display:"flex",gap:8}}>
            {["TikTok","Instagram","Facebook"].map(pl=>{
              const pp=P[pl]; const sel=f.platform===pl;
              return <button key={pl} onClick={()=>set("platform",pl)} style={{
                flex:1,padding:"10px 0",cursor:"pointer",
                background:sel?`${pp.accent}15`:"rgba(255,255,255,0.05)",
                border:`1.5px solid ${sel?pp.accent+"55":"rgba(44,26,14,0.1)"}`,
                borderRadius:12,color:sel?pp.accent:"#B8916F",
                fontSize:12,fontWeight:800,
                boxShadow:sel?`0 0 16px ${pp.glow}`:"none",
                transition:"all 0.2s"}}>{pl}</button>;
            })}
          </div>
        </div>

        {/* Thumbnail preview */}
        {(thumb||fetching) && (
          <div style={{marginBottom:16,borderRadius:12,overflow:"hidden",position:"relative",
            height:140,background:"rgba(44,26,14,0.04)",border:"1px solid rgba(44,26,14,0.1)"}}>
            {fetching && !thumb && (
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{width:24,height:24,borderRadius:"50%",border:"2px solid rgba(255,255,255,0.1)",borderTop:"2px solid #8e8e93",animation:"spin 0.8s linear infinite"}}/>
              </div>
            )}
            {thumb && (
              <img src={thumb} alt="thumbnail"
                style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}
                onError={()=>setThumb(null)}/>
            )}
            <div style={{position:"absolute",top:8,right:8,
              background:"rgba(44,26,14,0.55)",borderRadius:6,padding:"2px 8px",
              fontSize:10,color:"rgba(255,255,255,0.7)"}}>AUTO</div>
          </div>
        )}

        {[
          {label:t.urlLabel,key:"url",ph:t.urlPh,ta:false},
          {label:t.titleLabel,key:"title",ph:t.titlePh,ta:false},
          {label:t.savedByLabel,key:"savedBy",ph:t.savedByPh,ta:false},
          {label:t.notesLabel,key:"notes",ph:t.notesPh,ta:true},
        ].map(({label,key,ph,ta})=>(
          <div key={key} style={{marginBottom:14}}>
            <div style={{fontSize:10,fontWeight:700,color:"#B8916F",letterSpacing:1.8,marginBottom:6}}>{label}</div>
            {ta
              ? <textarea value={f[key]} onChange={e=>set(key,e.target.value)} placeholder={ph} rows={2}
                  style={{...inp,resize:"none"}}
                  onFocus={e=>e.target.style.border=`1px solid ${p.accent}66`}
                  onBlur={e=>e.target.style.border="1px solid rgba(255,255,255,0.1)"}/>
              : <input value={f[key]} onChange={e=>set(key,e.target.value)} placeholder={ph}
                  style={inp}
                  onFocus={e=>e.target.style.border=`1px solid ${p.accent}66`}
                  onBlur={e=>e.target.style.border="1px solid rgba(255,255,255,0.1)"}/>
            }
          </div>
        ))}

        <div style={{display:"flex",gap:12,marginBottom:22,alignItems:"flex-end"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:10,fontWeight:700,color:"#B8916F",letterSpacing:1.8,marginBottom:6}}>{t.catLabel}</div>
            <select value={f.category} onChange={e=>set("category",e.target.value)} style={{...inp,cursor:"pointer"}}>
              {(t.cats||CATEGORIES).map(c=><option key={c} style={{background:"#E8D5BC"}}>{c}</option>)}
            </select>
          </div>
          <div style={{paddingBottom:8}}>
            <div style={{fontSize:10,fontWeight:700,color:"#B8916F",letterSpacing:1.8,marginBottom:8}}>{t.ratingLabel}</div>
            <Stars val={f.rating} onChange={r=>set("rating",r)}/>
          </div>
        </div>

        <button onClick={submit} disabled={saving} style={{
          width:"100%",background:saving?"rgba(44,26,14,0.12)":p.grad,
          border:"none",borderRadius:14,padding:"14px",
          color:saving?"#B8916F":"#fff",fontSize:14,fontWeight:800,
          cursor:saving?"not-allowed":"pointer",
          boxShadow:saving?"none":`0 8px 20px ${p.glow}`,
          transition:"all 0.15s"}}>
          {saving?t.saving:t.simpan}
        </button>
      </div>
    </div>
  );
}



function NameGate({onEnter}) {
  const [name, setName] = useState("");
  const submit = () => {
    if(!name.trim()) return;
    localStorage.setItem("tv_username", name.trim());
    onEnter(name.trim());
  };
  return (

function VideoPlayer({v, onClose}) {
  const p = P[v.platform];

  const getEmbed = () => {
    const url = v.url || "";

    // TikTok
    if(url.includes("tiktok.com")) {
      // Extract video ID
      const match = url.match(/video\/([0-9]+)/) || url.match(/\/([0-9]{15,})/);
      const videoId = match ? match[1] : null;
      if(videoId) return (
        <iframe src={`https://www.tiktok.com/embed/v2/${videoId}`}
          style={{width:"100%",height:"100%",border:"none"}}
          allowFullScreen allow="autoplay"/>
      );
    }

    // Instagram Reels
    if(url.includes("instagram.com")) {
      const match = url.match(/\/reel\/([A-Za-z0-9_-]+)/) || url.match(/\/p\/([A-Za-z0-9_-]+)/);
      const code = match ? match[1] : null;
      if(code) return (
        <iframe src={`https://www.instagram.com/p/${code}/embed`}
          style={{width:"100%",height:"100%",border:"none"}}
          allowFullScreen/>
      );
    }

    // Facebook
    if(url.includes("facebook.com") || url.includes("fb.watch")) {
      return (
        <iframe src={`https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=false&autoplay=true`}
          style={{width:"100%",height:"100%",border:"none"}}
          allowFullScreen allow="autoplay; clipboard-write; encrypted-media; picture-in-picture"/>
      );
    }

    // YouTube (bonus)
    if(url.includes("youtube.com") || url.includes("youtu.be")) {
      const match = url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
      const vid = match ? match[1] : null;
      if(vid) return (
        <iframe src={`https://www.youtube.com/embed/${vid}?autoplay=1`}
          style={{width:"100%",height:"100%",border:"none"}}
          allowFullScreen allow="autoplay"/>
      );
    }

    // Fallback — open in browser
    return (
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
        height:"100%",gap:16,padding:24}}>
        <div style={{fontSize:48,opacity:0.3}}>▶</div>
        <div style={{fontSize:13,color:"#A0714F",textAlign:"center",lineHeight:1.6}}>
          Preview tidak tersedia untuk link ini.<br/>Tekan butang di bawah untuk tonton.
        </div>
        <button onClick={()=>window.open(v.url,"_blank")} style={{
          background:p.grad,border:"none",borderRadius:12,padding:"12px 24px",
          color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",
          boxShadow:`0 8px 20px ${p.glow}`}}>
          Buka Video →
        </button>
      </div>
    );
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:300,
      background:"rgba(44,26,14,0.88)",backdropFilter:"blur(20px)",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      padding:16}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>

      {/* Header */}
      <div style={{width:"100%",maxWidth:520,display:"flex",alignItems:"center",
        justifyContent:"space-between",marginBottom:12,padding:"0 4px"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:700,color:"#2C1A0E",
            whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{v.title}</div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
            <span style={{background:`${p.accent}22`,border:`1px solid ${p.accent}44`,
              borderRadius:5,padding:"2px 7px",fontSize:9,fontWeight:800,
              letterSpacing:1,color:p.accent}}>{v.platform?.toUpperCase()}</span>
            <span style={{fontSize:11,color:"#B8916F"}}>{v.category}</span>
          </div>
        </div>
        <button onClick={onClose} style={{
          width:34,height:34,borderRadius:"50%",flexShrink:0,marginLeft:12,
          background:"rgba(44,26,14,0.08)",border:"1px solid rgba(44,26,14,0.14)",
          color:"#6B4226",cursor:"pointer",fontSize:16,
          display:"flex",alignItems:"center",justifyContent:"center",
          transition:"all 0.15s"}}
          onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,69,58,0.2)";e.currentTarget.style.color="#ff453a";}}
          onMouseLeave={e=>{e.currentTarget.style.background="rgba(44,26,14,0.1)";e.currentTarget.style.color="#6B4226";}}>✕</button>
      </div>

      {/* Player */}
      <div style={{width:"100%",maxWidth:520,
        borderRadius:20,overflow:"hidden",
        background:"#E8D5BC",
        border:"1px solid rgba(44,26,14,0.1)",
        boxShadow:`0 24px 60px rgba(44,26,14,0.5), 0 0 0 1px rgba(255,255,255,0.05)`,
        aspectRatio:"9/16",maxHeight:"65vh",position:"relative"}}>
        {getEmbed()}
      </div>

      {/* Footer actions */}
      <div style={{width:"100%",maxWidth:520,display:"flex",gap:10,marginTop:12}}>
        <button onClick={()=>window.open(v.url,"_blank")} style={{
          flex:1,background:"rgba(44,26,14,0.07)",
          border:"1px solid rgba(44,26,14,0.12)",borderRadius:12,
          padding:"11px",color:"#6B4226",fontSize:13,fontWeight:600,
          cursor:"pointer",transition:"all 0.15s"}}
          onMouseEnter={e=>e.currentTarget.style.background="rgba(44,26,14,0.15)"}
          onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.07)"}>
          🔗 Buka Asal
        </button>
        <button onClick={()=>{navigator.clipboard?.writeText(v.url);}} style={{
          flex:1,background:"rgba(44,26,14,0.07)",
          border:"1px solid rgba(44,26,14,0.12)",borderRadius:12,
          padding:"11px",color:"#6B4226",fontSize:13,fontWeight:600,
          cursor:"pointer",transition:"all 0.15s"}}
          onMouseEnter={e=>e.currentTarget.style.background="rgba(44,26,14,0.15)"}
          onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.07)"}>
          📋 Copy Link
        </button>
      </div>
    </div>
  );
}

function App() {
  const [lang, setLang] = useState("ms");
  const t = LANG[lang];
  const [playingVideo, setPlayingVideo] = useState(null);
  const [userName, setUserName] = useState(()=>localStorage.getItem("tv_username")||null);
  const [notif, setNotif] = useState(null);
  const [lastCount, setLastCount] = useState(0);
  const [videos,   setVideos]   = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [error,    setError]    = useState(null);
  const [filter,   setFilter]   = useState("All");
  const [search,   setSearch]   = useState("");
  const [sort,     setSort]     = useState("latest");
  const [modal,    setModal]    = useState(false);
  const [toast,    setToast]    = useState(null);

  useEffect(()=>{
    const ref = db.ref("videos");
    ref.on("value", snap=>{
      try {
        const d = snap.val();
        if(d){
          const arr = Object.entries(d).map(([k,v])=>({...v,key:k}));
          const sorted = arr.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
        setVideos(prev => {
          // Notif if someone else saved a new video
          if(prev.length > 0 && sorted.length > prev.length) {
            const newest = sorted[0];
            const myName = localStorage.getItem("tv_username");
            if(newest.savedBy !== myName) {
              setNotif(newest);
            }
          }
          return sorted;
        });
        } else { setVideos([]); }
        setLoading(false);
      } catch(e){ setError(e.message); setLoading(false); }
    }, e=>{ setError(e.message); setLoading(false); });
    return ()=>ref.off();
  },[]);

  const showToast = msg=>{ setToast(msg); setTimeout(()=>setToast(null),2000); };
  const updateVideo = (key,ch)=>{ db.ref(`videos/${key}`).update(ch); showToast(t.updated); };
  const deleteVideo = key=>{ db.ref(`videos/${key}`).remove(); showToast(t.removed); };

  const list = videos
    .filter(v=>filter==="All"||v.platform===filter)
    .filter(v=>!search||v.title?.toLowerCase().includes(search.toLowerCase())||v.notes?.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>sort==="rating"?(b.rating||0)-(a.rating||0):(b.createdAt||0)-(a.createdAt||0));

  const stats = {
    total: videos.length,
    prog:  videos.filter(v=>v.status==="In Progress").length,
    used:  videos.filter(v=>v.status==="Used").length,
  };

  return (
    <div style={{minHeight:"100vh",background:"#F5EFE6",color:"#2C1A0E",position:"relative"}}>
      {!userName && <NameGate onEnter={n=>{setUserName(n);localStorage.setItem("tv_username",n);}}/>}

      {/* Toast */}

                  </div>
                  {/* Orbit dot TikTok */}
                  <div style={{position:"absolute",top:-4,right:-4,width:18,height:18,borderRadius:"50%",
                    background:"#FE2C55",boxShadow:"0 0 12px rgba(254,44,85,0.6)",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"#fff",fontWeight:900}}>TK</div>
                  {/* Orbit dot IG */}
                  <div style={{position:"absolute",bottom:-4,left:-4,width:18,height:18,borderRadius:"50%",
                    background:"linear-gradient(135deg,#833AB4,#E1306C)",boxShadow:"0 0 12px rgba(179,58,180,0.6)",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"#fff",fontWeight:900}}>IG</div>
                  {/* Orbit dot FB */}
                  <div style={{position:"absolute",top:-4,left:-8,width:18,height:18,borderRadius:"50%",
                    background:"#1877F2",boxShadow:"0 0 12px rgba(24,119,242,0.6)",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"#fff",fontWeight:900}}>FB</div>
                </div>
              </div>
            </div>

            {/* Text */}
            <div style={{textAlign:"center",maxWidth:260}}>
              <div style={{fontSize:22,fontWeight:900,color:"#2C1A0E",letterSpacing:-0.5,marginBottom:10,background:"linear-gradient(135deg,#f5f5f7,rgba(255,255,255,0.4))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{t.vaultEmpty}</div>
              <div style={{fontSize:13,color:"#B8916F",lineHeight:1.6,marginBottom:28}}>
                {t.vaultDesc}
              </div>
              <button onClick={()=>setModal(true)} style={{
                background:"linear-gradient(135deg,#FE2C55,#B33AB4)",
                border:"none",borderRadius:14,padding:"12px 28px",
                color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer",
                boxShadow:"0 8px 24px rgba(254,44,85,0.35), 0 0 0 1px rgba(255,255,255,0.1) inset",
                transition:"all 0.2s"}}
                onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 12px 32px rgba(254,44,85,0.45)";}}
                onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="0 8px 24px rgba(254,44,85,0.35)";}}
              >{t.saveFirst}</button>
            </div>
          </div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:16}}>
            {list.map(v=><Card key={v.key} v={v} onUpdate={updateVideo} onDelete={deleteVideo} t={t} onPlay={setPlayingVideo}/>)}
          </div>
        )}
      </div>

      {/* Watermark */}
      <div style={{textAlign:"center",padding:"10px 16px 28px",position:"relative",zIndex:1}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:7,
          background:"rgba(44,26,14,0.05)",border:"1px solid rgba(44,26,14,0.1)",
          borderRadius:20,padding:"6px 16px"}}>
          <span style={{fontSize:11,color:"#B8916F"}}>{t.builtBy}</span>
          <span style={{fontSize:12,fontWeight:900,background:"linear-gradient(90deg,#FE2C55,#B33AB4)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Ali</span>
          <span style={{fontSize:11,color:"#C4A882"}}>·</span>
          <span style={{fontSize:12,fontWeight:900,background:"linear-gradient(90deg,#1877F2,#B33AB4)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>TMOMO Buddy</span>
        </div>
      </div>

      {playingVideo&&<VideoPlayer v={playingVideo} onClose={()=>setPlayingVideo(null)}/>}
      {modal&&<Modal onAdd={()=>{}} onClose={()=>setModal(false)} t={t} lang={lang} userName={userName}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
